name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  secret-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tracked files must not contain banned secret patterns
        run: bash scripts/audit-repo-secrets.sh

  backend:
    runs-on: ubuntu-latest
    needs: secret-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: devops-canvas-backend/go.mod
      - name: Go build
        working-directory: devops-canvas-backend
        run: go build ./...
      - name: Go test
        working-directory: devops-canvas-backend
        run: go test ./... -count=1
        continue-on-error: false

  frontend:
    runs-on: ubuntu-latest
    needs: secret-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: devops-canvas-frontend/package-lock.json
      - name: Install and build
        working-directory: devops-canvas-frontend
        # react-xtermjs peer conflicts with @xterm/xterm major; same as local installs
        run: npm ci --legacy-peer-deps && npm run build
