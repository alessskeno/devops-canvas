services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-canvas-ui
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    # Healthcheck to ensure nginx is running
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
